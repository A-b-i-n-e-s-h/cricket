<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Squad Selection</title>
</head>

<body>
    <div class="body-grid">
        <header>
            <div class="header-left">
                <div class="logo">
                    <img class="logo-header" src="assests/bcci-logo-rounded.webp" alt="bcci">
                </div>
                <p class="active">International</p>
                <p>Domestic</p>
            </div>
            <div class="header-right">
                <div class="logo">
                    <img class="search-header" src="assests/search-icon.webp" alt="bcci">
                </div>
                <div class="logo">
                    <img src="assests/ipl-logo.webp" alt="bcci">
                </div>
                <div class="logo">
                    <img src="assests/wpl-logo.webp" alt="bcci">
                </div>

            </div>
        </header>



        <section class="container">
            <div id="tree-container">
                <h1>Select the Squad</h1>
                <button onclick="showData();">Show Squad</button>
                <div id="tree"></div>
            </div>
            <div id="chips-container">
                <div id="chips"></div>
                <div id="limit-container">
                    <div id="counter">0/11</div>
                    <button id="confirm-btn">Confirm Team</button>
                </div>

            </div>

        </section>

                    <p>Match</p>
                    <p>Videos</p>
